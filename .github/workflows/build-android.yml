name: Build GEOSTAR Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            build-essential ccache \
            autopoint gettext \
            libltdl-dev

      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache project .buildozer directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-local-${{ runner.os }}-

      - name: Install Buildozer & Cython
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --upgrade Cython==0.29.36 virtualenv
          pip install buildozer==1.5.0

      - name: Build Android APK (debug)
        run: |
          export PATH=$PATH:~/.local/bin/
          yes | buildozer android debug 2>&1 | tee build.log

      - name: Find generated APK
        if: always()
        run: |
          echo "=== Recherche de tous les APK générés ==="
          find . -name "*.apk" -type f 2>/dev/null || echo "Aucun APK trouvé"
          echo "=== Contenu de bin/ ==="
          ls -la bin/ 2>/dev/null || echo "bin/ n'existe pas"
          echo "=== Contenu de .buildozer/android/platform/build-*/dists ==="
          ls -la .buildozer/android/platform/build-*/dists/ 2>/dev/null || echo "Dossier dists introuvable"

      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: geostar-apk-debug
          path: |
            **/*.apk
          retention-days: 30
          if-no-files-found: warn

      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.log
            .buildozer/android/platform/build-*/build.log
          retention-days: 7
          if-no-files-found: ignore
