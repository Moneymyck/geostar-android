name: Build GEOSTAR Android APK

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:  # Permet de lancer le build manuellement depuis l'onglet Actions

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-22.04  # Version stable connue, pas latest (évite breakage)
    timeout-minutes: 120   # Le 1er build peut prendre 60-90 minutes

    steps:
      # --- 1. Récupération du code ---
      - name: Checkout repository
        uses: actions/checkout@v4

      # --- 2. Python 3.10 (compatible buildozer + p4a) ---
      - name: Set up Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      # --- 3. Java 17 (requis par les versions modernes du SDK Android) ---
      - name: Set up Java 17 (Temurin)
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # --- 4. Dépendances système Linux pour buildozer ---
      # Liste exhaustive issue des retours d'erreurs connues sur GitHub Actions.
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git zip unzip openjdk-17-jdk \
            python3-pip autoconf libtool pkg-config \
            zlib1g-dev libncurses5-dev libncursesw5-dev \
            libtinfo5 cmake libffi-dev libssl-dev \
            build-essential ccache \
            autopoint gettext \
            libltdl-dev

      # --- 5. Cache de buildozer pour accélérer les builds suivants ---
      - name: Cache Buildozer global directory
        uses: actions/cache@v4
        with:
          path: ~/.buildozer
          key: buildozer-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-${{ runner.os }}-

      - name: Cache project .buildozer directory
        uses: actions/cache@v4
        with:
          path: .buildozer
          key: buildozer-local-${{ runner.os }}-${{ hashFiles('buildozer.spec') }}
          restore-keys: |
            buildozer-local-${{ runner.os }}-

      # --- 6. Installation de buildozer + Cython ---
      # Versions fixées pour reproductibilité.
      - name: Install Buildozer & Cython
        run: |
          python -m pip install --upgrade pip setuptools wheel
          pip install --upgrade Cython==0.29.36 virtualenv
          pip install buildozer==1.5.0

      # --- 7. Build APK debug ---
      - name: Build Android APK (debug)
        run: |
          export PATH=$PATH:~/.local/bin/
          # Désactiver le mode interactif (auto-accept SDK licence)
          yes | buildozer android debug 2>&1 | tee build.log
        continue-on-error: false

      # --- 8. Publication de l'APK comme artefact téléchargeable ---
      - name: Upload APK artifact
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: geostar-apk-debug
          path: bin/*.apk
          retention-days: 30
          if-no-files-found: error

      # --- 9. Upload des logs en cas d'échec pour diagnostic ---
      - name: Upload build log on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: build-log
          path: |
            build.log
            .buildozer/android/platform/build-*/build.log
          retention-days: 7
          if-no-files-found: ignore
